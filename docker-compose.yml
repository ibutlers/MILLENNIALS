services:
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: "${DATABASE_URL:-postgres://realstate:realstate_password@postgres:5432/realstate}"
      LEADS_ENABLED: "${LEADS_ENABLED:-false}"
      PRIVACY_CONTROLLER_NAME: "${PRIVACY_CONTROLLER_NAME:-}"
      PRIVACY_CONTACT_EMAIL: "${PRIVACY_CONTACT_EMAIL:-}"
      PRIVACY_POLICY_VERSION: "${PRIVACY_POLICY_VERSION:-2026-06-14}"
      LEADS_RATE_LIMIT_MAX: "${LEADS_RATE_LIMIT_MAX:-5}"
      LEADS_RATE_LIMIT_WINDOW_MS: "${LEADS_RATE_LIMIT_WINDOW_MS:-900000}"
      AUTH_ENABLED: "${AUTH_ENABLED:-false}"
      REGISTRATION_ENABLED: "${REGISTRATION_ENABLED:-false}"
      EMAIL_DELIVERY_ENABLED: "${EMAIL_DELIVERY_ENABLED:-false}"
      APP_BASE_URL: "${APP_BASE_URL:-http://65.108.251.196:8088}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-true}"
      SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-86400}"
      SESSION_IDLE_TTL_SECONDS: "${SESSION_IDLE_TTL_SECONDS:-3600}"
      EMAIL_VERIFICATION_TTL_SECONDS: "${EMAIL_VERIFICATION_TTL_SECONDS:-1800}"
      PASSWORD_RESET_TTL_SECONDS: "${PASSWORD_RESET_TTL_SECONDS:-1800}"
      AUTH_RATE_LIMIT_MAX: "${AUTH_RATE_LIMIT_MAX:-10}"
      AUTH_RATE_LIMIT_WINDOW_MS: "${AUTH_RATE_LIMIT_WINDOW_MS:-900000}"
      ADMIN_ENABLED: "${ADMIN_ENABLED:-false}"
      ADMIN_MEDIA_UPLOAD_ENABLED: "${ADMIN_MEDIA_UPLOAD_ENABLED:-false}"
      DEMO_SEED_ENABLED: "${DEMO_SEED_ENABLED:-false}"
    depends_on: [postgres]
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-realstate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realstate_password}
      POSTGRES_DB: ${POSTGRES_DB:-realstate}
    volumes: [postgres-data:/var/lib/postgresql/data]
    restart: unless-stopped
  proxy:
    image: caddy:2-alpine
    ports: ["${REALSTATE_HTTP_PORT:-8088}:80"]
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-:80}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [frontend, api]
    restart: unless-stopped
volumes:
  postgres-data: {}
  caddy-data: {}
  caddy-config: {}
