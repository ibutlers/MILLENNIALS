# Isolated validation environment — NO relation to production
# Project name: hito11_repair_iso
# NEVER use this for production

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: realstate
      POSTGRES_PASSWORD: realst...ord
      POSTGRES_DB: realstate
    volumes:
      - pg_iso_test:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realstate -d realstate"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  pg_iso_test:
