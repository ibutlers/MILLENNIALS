# E2E Auth — ephemeral environment for Better Auth testing
# DO NOT use production PostgreSQL or volumes.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: realstate_e2e
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: realstate_e2e
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - e2e_auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realstate_e2e -d realstate_e2e"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://realstate_e2e:${POSTGRES_PASSWORD}@postgres:5432/realstate_e2e
      NODE_ENV: e2e
      AUTH_MODE: better-auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: http://127.0.0.1:8090
      BETTER_AUTH_TRUSTED_ORIGINS: http://127.0.0.1:8090,http://localhost:8090
      BETTER_AUTH_ALLOWED_HOSTS: 127.0.0.1,localhost
      BETTER_AUTH_REQUIRE_2FA: "true"
      AUTH_EMAIL_MODE: capture
      AUTH_EMAIL_FROM: e2e@realstate.test
      ADMIN_ENABLED: "true"
      ADMIN_MEDIA_UPLOAD_ENABLED: "false"
      DEMO_SEED_ENABLED: "true"
      LEADS_ENABLED: "true"
      REGISTRATION_ENABLED: "true"
      E2E_TEST_MODE: "true"
      E2E_INTERNAL_SECRET: ${E2E_INTERNAL_SECRET}
      AUTH_RATE_LIMIT_MAX: "10000"
      APP_BASE_URL: http://127.0.0.1:8090
      SESSION_COOKIE_SECURE: "false"
      PRIVACY_CONTROLLER_NAME: "Realstate E2E Auth Test"
      PRIVACY_CONTACT_EMAIL: "e2e-auth@realstate.test"
      PRIVACY_POLICY_VERSION: "2026-06-e2e-auth"
    ports:
      - "127.0.0.1:8089:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://127.0.0.1:8089
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./nginx-e2e.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  e2e_auth_postgres_data:
